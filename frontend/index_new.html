<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalshi Basketball Trader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0e1a;
            color: #fff;
        }
        
        .header {
            background: #1a1f35;
            padding: 1rem 2rem;
            border-bottom: 2px solid #00ff88;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 1.5rem;
            color: #00ff88;
        }
        
        .balance-info {
            display: flex;
            gap: 2rem;
            font-size: 0.95rem;
        }
        
        .balance-info span {
            color: #00ff88;
            font-weight: 600;
        }
        
        .main-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .search-box {
            flex: 1;
            min-width: 300px;
            padding: 0.75rem 1rem;
            background: #1a1f35;
            border: 1px solid #2a3550;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary { background: #00ff88; color: #000; }
        .btn-primary:hover { background: #00dd77; }
        
        .btn-secondary { background: #2a3550; color: #fff; }
        .btn-secondary:hover { background: #3a4560; }
        
        .markets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
            gap: 1.5rem;
        }
        
        .market-card {
            background: #1a1f35;
            border: 1px solid #2a3550;
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.2s;
        }
        
        .market-card:hover {
            border-color: #00ff88;
            transform: translateY(-2px);
        }
        
        .market-title {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: #fff;
            line-height: 1.4;
        }
        
        .market-meta {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: #8892a6;
        }
        
        .price-display {
            display: flex;
            gap: 1rem;
        }
        
        .price-box {
            flex: 1;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .price-box:hover {
            transform: scale(1.05);
        }
        
        .price-box.yes {
            background: linear-gradient(135deg, #1e3a20 0%, #2d5a2f 100%);
            border: 2px solid #00ff88;
        }
        
        .price-box.no {
            background: linear-gradient(135deg, #3a1e1e 0%, #5a2d2d 100%);
            border: 2px solid #ff4444;
        }
        
        .price-box .label {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-bottom: 0.5rem;
        }
        
        .price-box .price {
            font-size: 2rem;
            font-weight: 700;
        }
        
        .price-box.yes .price { color: #00ff88; }
        .price-box.no .price { color: #ff4444; }
        
        .arb-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: #ffaa00;
            color: #000;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-left: 0.5rem;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: #1a1f35;
            padding: 2rem;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            border: 2px solid #00ff88;
        }
        
        .modal-header {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #00ff88;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #8892a6;
            font-size: 0.9rem;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.75rem;
            background: #0a0e1a;
            border: 1px solid #2a3550;
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
        }
        
        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .form-actions button {
            flex: 1;
        }
        
        /* Active Bots Section */
        .bots-section {
            background: #1a1f35;
            border: 1px solid #2a3550;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .bots-section h2 {
            margin-bottom: 1rem;
            color: #00ff88;
        }
        
        .bot-item {
            background: #0a0e1a;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .bot-status {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .bot-status.monitoring { background: #ffaa00; color: #000; }
        .bot-status.leg1_filled { background: #00aaff; color: #fff; }
        .bot-status.completed { background: #00ff88; color: #000; }
        .bot-status.stopped { background: #ff4444; color: #fff; }
        
        .hidden { display: none !important; }

        /* Sport filter pills */
        .sport-pill {
            padding: 5px 14px;
            border-radius: 20px;
            border: 1px solid #2a3550;
            background: #1a1f35;
            color: #8892a6;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .sport-pill:hover { border-color: #00ff88; color: #00ff88; }
        .sport-pill.active { background: #00ff88; color: #000; border-color: #00ff88; }

        /* Live score chip */
        .live-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #0f1a0f;
            border: 1px solid #1a3a1a;
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 12px;
            white-space: nowrap;
        }
        .live-chip.live { border-color: #00ff88; }
        .live-chip .teams { color: #fff; font-weight: 600; }
        .live-chip .score { color: #00ff88; font-weight: 700; }
        .live-chip .clock { color: #8892a6; font-size: 10px; }
        .live-chip .final { color: #8892a6; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏀 Kalshi Basketball Trader</h1>
        <div class="balance-info" id="balance-display" style="display: none;">
            <div>Balance: <span id="balance-amount">$0.00</span></div>
            <div>Portfolio: <span id="portfolio-value">$0.00</span></div>
        </div>
        <button id="login-status" class="btn btn-primary" onclick="window.location.reload()">Logged In ✓</button>
    </div>
    
    <div class="main-container">
        <!-- Active Bots -->
        <div class="bots-section" id="bots-section" style="display: none;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                <h2 style="margin:0;">Active Trading Bots</h2>
            </div>
            <!-- P&L Dashboard (Upgrade #6) -->
            <div id="pnl-display" style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;padding:8px 12px;background:#0a0e1a;border-radius:8px;margin-bottom:12px;font-size:13px;min-height:32px;"></div>
            <div id="bots-list">
                <p style="color: #8892a6;">No active bots</p>
            </div>
        </div>

        <!-- Live Scores Bar -->
        <div id="live-scores-bar" style="display:none; background:#1a1f35; border:1px solid #2a3550; border-radius:10px; padding:12px 16px; margin-bottom:16px;">
            <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
                <span style="color:#00ff88; font-weight:700; font-size:12px; letter-spacing:.05em; white-space:nowrap;">🔴 LIVE SCORES</span>
                <div id="live-scores-content" style="display:flex; gap:10px; flex-wrap:wrap; flex:1;"></div>
                <button onclick="loadLiveScores()" style="background:none;border:1px solid #2a3550;color:#8892a6;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px;">↺</button>
            </div>
        </div>

        <!-- Sport Filter Pills -->
        <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; align-items:center;">
            <span style="color:#8892a6; font-size:12px; font-weight:600; white-space:nowrap;">Filter:</span>
            <button class="sport-pill active" data-sport="all"    onclick="filterBySport('all')">All</button>
            <button class="sport-pill"        data-sport="nba"    onclick="filterBySport('nba')">🏀 NBA</button>
            <button class="sport-pill"        data-sport="nfl"    onclick="filterBySport('nfl')">🏈 NFL</button>
            <button class="sport-pill"        data-sport="mlb"    onclick="filterBySport('mlb')">⚾ MLB</button>
            <button class="sport-pill"        data-sport="nhl"    onclick="filterBySport('nhl')">🏒 NHL</button>
            <button class="sport-pill"        data-sport="ncaab"  onclick="filterBySport('ncaab')">🎓 NCAAB</button>
            <button class="sport-pill"        data-sport="other"  onclick="filterBySport('other')">Other</button>
        </div>

        <!-- Controls -->
        <div class="controls">
            <input type="text" class="search-box" id="search-box" placeholder="Search markets (e.g., Lakers, Celtics, NBA)...">
            <button class="btn btn-primary" onclick="loadMarkets()">🔄 Refresh</button>
            <button class="btn btn-secondary" onclick="toggleAutoMonitor()">
                <span id="auto-monitor-text">▶️ Start Auto-Monitor</span>
            </button>
            <button class="btn btn-secondary" onclick="autoScanMarkets()" title="Find all arb opportunities across all open markets">🔍 Auto-Scan</button>
            <label style="color: #8892a6; font-size: 11px; margin-left: 8px;">Min Width (¢):</label>
            <input type="number" id="scan-min-width" min="1" max="20" value="3" title="Min arb width (¢) to scan for"
                   style="width:60px;padding:0.75rem 0.5rem;background:#1a1f35;border:1px solid #2a3550;border-radius:8px;color:#fff;font-size:0.9rem;text-align:center;">
            <label style="color: #8892a6; font-size: 11px; margin-left: 8px;">Qty:</label>
            <input type="number" id="scan-qty" min="1" value="1" title="Contracts per auto-bot"
                   style="width:50px;padding:0.75rem 0.5rem;background:#1a1f35;border:1px solid #2a3550;border-radius:8px;color:#fff;font-size:0.9rem;text-align:center;" placeholder="Qty">
        </div>

        <!-- Markets Grid -->
        <div class="markets-grid" id="markets-grid">
            <p style="color: #8892a6; text-align: center; grid-column: 1 / -1;">Loading markets...</p>
        </div>
    </div>
    
    <!-- Dual Arb Bot Modal -->
    <div class="modal" id="bot-modal">
        <div class="modal-content" style="max-width: 520px;">
            <h2 class="modal-header" style="display:flex;align-items:center;gap:8px;">🤖 Dual Arb Bot</h2>

            <!-- Market Info -->
            <div id="bot-market-info" style="background:#0a0e1a;border-radius:8px;padding:10px 14px;margin-bottom:1.2rem;font-size:0.88rem;">
                <div id="bot-market-title" style="color:#fff;font-weight:600;margin-bottom:4px;"></div>
                <div id="bot-market-prices" style="color:#8892a6;font-size:0.8rem;"></div>
            </div>

            <!-- Arb Width -->
            <div class="form-group">
                <label style="display:flex;justify-content:space-between;">
                    <span>Arb Width (guaranteed profit per contract)</span>
                    <span id="width-display" style="color:#00ff88;font-weight:700;font-size:1rem;">5¢</span>
                </label>
                <input type="number" id="bot-arb-width" min="1" max="30" value="5" step="1"
                       oninput="recalcArbPrices()" style="font-size:1rem;">
            </div>

            <!-- YES / NO Price Inputs -->
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">
                <div>
                    <label style="color:#00ff88;font-weight:700;font-size:0.85rem;display:block;margin-bottom:4px;">YES Limit Buy (¢)</label>
                    <input type="number" id="bot-yes-price" min="1" max="98"
                           oninput="onPriceManualChange()"
                           style="width:100%;padding:.6rem;background:#0a0e1a;border:2px solid #00ff88;border-radius:6px;color:#00ff88;font-size:1.3rem;font-weight:700;text-align:center;">
                </div>
                <div>
                    <label style="color:#ff4444;font-weight:700;font-size:0.85rem;display:block;margin-bottom:4px;">NO Limit Buy (¢)</label>
                    <input type="number" id="bot-no-price" min="1" max="98"
                           oninput="onPriceManualChange()"
                           style="width:100%;padding:.6rem;background:#0a0e1a;border:2px solid #ff4444;border-radius:6px;color:#ff4444;font-size:1.3rem;font-weight:700;text-align:center;">
                </div>
            </div>

            <!-- Profit Preview -->
            <div id="profit-preview" style="margin-bottom:1rem;"></div>

            <!-- Quantity & Stop Loss -->
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                <div class="form-group" style="margin-bottom:0;">
                    <label>Contracts (qty)</label>
                    <input type="number" id="bot-quantity" min="1" value="1"
                           oninput="updateProfitPreview()">
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label>Stop Loss (¢ drop → market exit)</label>
                    <input type="number" id="bot-stop-loss-cents" min="1" max="30" value="5">
                </div>
            </div>

            <div class="form-actions" style="margin-top:1.5rem;">
                <button class="btn btn-primary" onclick="createBot()">🤖 Place Both Orders</button>
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>
    
    <!-- Auto-Scan Modal (Upgrade #3) -->
    <div class="modal" id="scan-modal">
        <div class="modal-content" style="max-width:640px;max-height:80vh;display:flex;flex-direction:column;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
                <h2 class="modal-header" style="margin:0;">🔍 Arb Scanner</h2>
                <div style="display:flex;gap:8px;align-items:center;">
                    <span id="scan-count" style="color:#8892a6;font-size:12px;"></span>
                    <button class="btn btn-secondary" onclick="closeScanModal()" style="padding:.4rem .9rem;font-size:13px;">✕ Close</button>
                </div>
            </div>
            <div id="scan-results" style="flex:1;overflow-y:auto;"></div>
        </div>
    </div>

    <script src="app_new.js"></script>
</body>
</html>
