<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalshi Basketball Trader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0e1a;
            color: #fff;
        }
        
        .header {
            background: #1a1f35;
            padding: 1rem 2rem;
            border-bottom: 2px solid #00ff88;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 1.5rem;
            color: #00ff88;
        }
        
        .balance-info {
            display: flex;
            gap: 2rem;
            font-size: 0.95rem;
        }
        
        .balance-info span {
            color: #00ff88;
            font-weight: 600;
        }
        
        .main-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .search-box {
            flex: 1;
            min-width: 300px;
            padding: 0.75rem 1rem;
            background: #1a1f35;
            border: 1px solid #2a3550;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary { background: #00ff88; color: #000; }
        .btn-primary:hover { background: #00dd77; }
        
        .btn-secondary { background: #2a3550; color: #fff; }
        .btn-secondary:hover { background: #3a4560; }
        
        .markets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
            gap: 1.5rem;
        }
        
        .market-card {
            background: #1a1f35;
            border: 1px solid #2a3550;
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.2s;
        }
        
        .market-card:hover {
            border-color: #00ff88;
            transform: translateY(-2px);
        }
        
        .market-title {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: #fff;
            line-height: 1.4;
        }
        
        .market-meta {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: #8892a6;
        }
        
        .price-display {
            display: flex;
            gap: 1rem;
        }
        
        .price-box {
            flex: 1;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .price-box:hover {
            transform: scale(1.05);
        }
        
        .price-box.yes {
            background: linear-gradient(135deg, #1e3a20 0%, #2d5a2f 100%);
            border: 2px solid #00ff88;
        }
        
        .price-box.no {
            background: linear-gradient(135deg, #3a1e1e 0%, #5a2d2d 100%);
            border: 2px solid #ff4444;
        }
        
        .price-box .label {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-bottom: 0.5rem;
        }
        
        .price-box .price {
            font-size: 2rem;
            font-weight: 700;
        }
        
        .price-box.yes .price { color: #00ff88; }
        .price-box.no .price { color: #ff4444; }
        
        .arb-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: #ffaa00;
            color: #000;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-left: 0.5rem;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: #1a1f35;
            padding: 2rem;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            border: 2px solid #00ff88;
        }
        
        .modal-header {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #00ff88;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #8892a6;
            font-size: 0.9rem;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.75rem;
            background: #0a0e1a;
            border: 1px solid #2a3550;
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
        }
        
        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .form-actions button {
            flex: 1;
        }
        
        /* Active Bots Section */
        .bots-section {
            background: #1a1f35;
            border: 1px solid #2a3550;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .bots-section h2 {
            margin-bottom: 1rem;
            color: #00ff88;
        }
        
        .bot-item {
            background: #0a0e1a;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .bot-status {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .bot-status.monitoring { background: #ffaa00; color: #000; }
        .bot-status.leg1_filled { background: #00aaff; color: #fff; }
        .bot-status.completed { background: #00ff88; color: #000; }
        .bot-status.stopped { background: #ff4444; color: #fff; }
        
        .hidden { display: none !important; }

        /* Sport filter pills */
        .sport-pill {
            padding: 5px 14px;
            border-radius: 20px;
            border: 1px solid #2a3550;
            background: #1a1f35;
            color: #8892a6;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .sport-pill:hover { border-color: #00ff88; color: #00ff88; }
        .sport-pill.active { background: #00ff88; color: #000; border-color: #00ff88; }

        /* Live score chip */
        .live-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #0f1a0f;
            border: 1px solid #1a3a1a;
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 12px;
            white-space: nowrap;
        }
        .live-chip.live { border-color: #00ff88; }
        .live-chip .teams { color: #fff; font-weight: 600; }
        .live-chip .score { color: #00ff88; font-weight: 700; }
        .live-chip .clock { color: #8892a6; font-size: 10px; }
        .live-chip .final { color: #8892a6; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏀 Kalshi Basketball Trader</h1>
        <div class="balance-info" id="balance-display" style="display: none;">
            <div>Balance: <span id="balance-amount">$0.00</span></div>
            <div>Portfolio: <span id="portfolio-value">$0.00</span></div>
        </div>
        <button id="login-status" class="btn btn-primary" onclick="window.location.reload()">Logged In ✓</button>
    </div>
    
    <div class="main-container">
        <!-- Active Bots -->
        <div class="bots-section" id="bots-section" style="display: none;">
            <h2>Active Trading Bots</h2>
            <div id="bots-list">
                <p style="color: #8892a6;">No active bots</p>
            </div>
        </div>

        <!-- Live Scores Bar -->
        <div id="live-scores-bar" style="display:none; background:#1a1f35; border:1px solid #2a3550; border-radius:10px; padding:12px 16px; margin-bottom:16px;">
            <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
                <span style="color:#00ff88; font-weight:700; font-size:12px; letter-spacing:.05em; white-space:nowrap;">🔴 LIVE SCORES</span>
                <div id="live-scores-content" style="display:flex; gap:10px; flex-wrap:wrap; flex:1;"></div>
                <button onclick="loadLiveScores()" style="background:none;border:1px solid #2a3550;color:#8892a6;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px;">↺</button>
            </div>
        </div>

        <!-- Sport Filter Pills -->
        <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; align-items:center;">
            <span style="color:#8892a6; font-size:12px; font-weight:600; white-space:nowrap;">Filter:</span>
            <button class="sport-pill active" data-sport="all"    onclick="filterBySport('all')">All</button>
            <button class="sport-pill"        data-sport="nba"    onclick="filterBySport('nba')">🏀 NBA</button>
            <button class="sport-pill"        data-sport="nfl"    onclick="filterBySport('nfl')">🏈 NFL</button>
            <button class="sport-pill"        data-sport="mlb"    onclick="filterBySport('mlb')">⚾ MLB</button>
            <button class="sport-pill"        data-sport="nhl"    onclick="filterBySport('nhl')">🏒 NHL</button>
            <button class="sport-pill"        data-sport="ncaab"  onclick="filterBySport('ncaab')">🎓 NCAAB</button>
            <button class="sport-pill"        data-sport="other"  onclick="filterBySport('other')">Other</button>
        </div>

        <!-- Controls -->
        <div class="controls">
            <input type="text" class="search-box" id="search-box" placeholder="Search markets (e.g., Lakers, Celtics, NBA)...">
            <button class="btn btn-primary" onclick="loadMarkets()">🔄 Refresh</button>
            <button class="btn btn-secondary" onclick="toggleAutoMonitor()">
                <span id="auto-monitor-text">▶️ Start Auto-Monitor</span>
            </button>
        </div>

        <!-- Markets Grid -->
        <div class="markets-grid" id="markets-grid">
            <p style="color: #8892a6; text-align: center; grid-column: 1 / -1;">Loading markets...</p>
        </div>
    </div>
    
    <!-- Bot Creation Modal -->
    <div class="modal" id="bot-modal">
        <div class="modal-content">
            <h2 class="modal-header">Create Trading Bot</h2>
            <div id="bot-form">
                <div class="form-group">
                    <label>Market:</label>
                    <div id="bot-market-title" style="color: #fff; font-size: 0.95rem; padding: 0.5rem 0;"></div>
                </div>
                
                <div class="form-group">
                    <label>Side:</label>
                    <div id="bot-side" style="color: #00ff88; font-size: 1.2rem; font-weight: 700;"></div>
                </div>
                
                <div class="form-group">
                    <label>Target Price (cents):</label>
                    <input type="number" id="bot-target-price" min="1" max="99" value="50">
                </div>
                
                <div class="form-group">
                    <label>Quantity (contracts):</label>
                    <input type="number" id="bot-quantity" min="1" value="1">
                </div>
                
                <div class="form-group">
                    <label>Arb Width (% profit needed to auto-complete):</label>
                    <input type="number" id="bot-arb-width" min="0" max="50" step="0.5" value="3">
                </div>
                
                <div class="form-group">
                    <label>Stop Loss (% drop to trigger sell):</label>
                    <input type="number" id="bot-stop-loss" min="1" max="50" step="1" value="5">
                </div>
                
                <div class="form-actions">
                    <button class="btn btn-primary" onclick="createBot()">Create Bot</button>
                    <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="app_new.js"></script>
</body>
</html>
